<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redact</title>
  <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <span class="sidebar-item">History</span> 
      </div>
    </aside>
    <div class="right">
      <nav class="nav">
        <span class="nav-logo">Transce<sup>3</sup>nd</span>
        <span class="nav-label">Internal Tooling</span>
      </nav>
      <main class="main">

        
        <div class="upload-section" id="upload-section">
          <h1>Upload Documents</h1>
          <p class="upload-sub">Types: pdf · docx · xlsx</p>
          <div class="divider"></div>
          <h2>Names of Client</h2>

          <div class="name-row">
            <input type="text" placeholder="Full Name" class="text-input" />
          </div>

          <div class="name-row">
            <input type="text" placeholder="Full Name" class="text-input" />
            <button type="button" id="more" onclick="addName(this)">+</button>
          </div>

          <div id="extra-names"></div>

          <label class="file-label" id="file-label-btn">
            Choose Files
            <input type="file" id="file-input" multiple accept=".pdf,.docx,.xlsx" />
          </label>
          <div id="file-list" class="file-list"></div>

          <button type="button" id="submit-btn" onclick="submitForm()">Submit for processing</button>
        </div>

      
        <div class="spinner" id="spinner">
          <div class="spinner-ring"></div>
          <p>Processing your documents</p>
        </div>

        <div class="output" id="output">
          <h1>Results</h1>
          <p id="output-text">Your documents have been uploaded successfully.</p>
          <button type="button" onclick="resetForm()">Start Over</button>
        </div>

      </main>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
