upstream api_backend {
    least_conn;
    server api1:8000;
    server api2:8000;
    keepalive 32;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Global body size limit — must be here AND in location block
    client_max_body_size 100M;

    # Security: block git, vscode, sftp exposure
    location ~ /\.(git|vscode) {
        deny all;
        return 404;
    }

    location ~ /(sftp-config\.json|wp-includes|xmlrpc|wlwmanifest) {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /process {
        proxy_pass         http://api_backend/process;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        client_max_body_size    100M;
        client_body_buffer_size 100M;

        # Give long-running PII jobs room to finish (5 min)
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # On timeout or backend error, try the next healthy instance
        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /health {
        proxy_pass         http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 10s;
    }
}