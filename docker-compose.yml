services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api1
      - api2
    restart: unless-stopped
    mem_limit: 256m

  api1:
    build: ./api
    expose:
      - "8000"
    restart: unless-stopped
    mem_limit: 4g

  api2:
    build: ./api
    expose:
      - "8000"
    restart: unless-stopped
    mem_limit: 4g

